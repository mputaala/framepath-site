# US-157 (Sprint 28) -- weekly Dependabot for npm + github-actions.
# open-pull-requests-limit: 5 prevents PR flood during quiet weeks; a
# higher limit produces noise on a 1-engineer repo without proportional
# value.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Helsinki"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    # Major bumps that require a deliberate migration project — not
    # something Dependabot can land mechanically. Adding them here
    # keeps the PR list free of noise until an engineer picks up the
    # migration. Remove the entry when starting the migration; a
    # rebased major-bump PR will then appear on the next Monday run.
    ignore:
      # Tailwind 4 is a full rewrite: `tailwind.config.js` retired in
      # favour of CSS `@theme` / `@config`; `@tailwind base/components/
      # utilities` becomes `@import "tailwindcss"`; PostCSS plugin
      # split into `@tailwindcss/postcss`. See closed PR #8.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Helsinki"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    labels:
      - "github-actions"
