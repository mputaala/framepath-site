name: Deploy to GitHub Pages

# US-154 / Sprint 28 — Next.js static-export deploy.
# Replaces the Sprint 28 placeholder workflow that uploaded index.html + CNAME
# directly. The publish.yml workflow added in US-155 / US-156 will extend this
# chain with the dev-repo content sync.
#
# Action SHA pins (per the SHA-pinning convention codified by US-157):
#   actions/checkout@v7.0.0              -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/setup-node@v6.4.0            -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
#   actions/configure-pages@v6.0.0       -> 45bfe0192ca1faeb007ade9deae92b16b8254a0d
#   actions/upload-pages-artifact@v5.0.0 -> fc324d3547104276b827a68afc52ff2a11cc49c9
#   actions/deploy-pages@v5.0.0          -> cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy; queue follow-ups rather than cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
