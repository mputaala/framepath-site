name: Deploy to GitHub Pages

# US-153 / Sprint 28 — placeholder deploy.
# Replaced by publish.yml's sync -> build -> deploy chain in US-155 / US-156.
#
# Action SHA pins (per the SHA-pinning convention codified by US-157):
#   actions/checkout@v7.0.0              -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/configure-pages@v6.0.0       -> 45bfe0192ca1faeb007ade9deae92b16b8254a0d
#   actions/upload-pages-artifact@v5.0.0 -> fc324d3547104276b827a68afc52ff2a11cc49c9
#   actions/deploy-pages@v5.0.0          -> cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy; queue follow-ups rather than cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Stage public files
        # Default-deny: only the explicitly named files are uploaded as the
        # Pages artefact. Anything else in the repo root stays out.
        run: |
          mkdir -p _site
          cp index.html _site/
          cp CNAME _site/

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
