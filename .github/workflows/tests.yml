name: Unit Tests

# Sprint 29 / Sprint 28 carry-forward issue mputaala/Frame#279 — vitest gate
# on every PR. Sprint 28 added `npm test` (vitest run) to package.json + 36
# passing tests for scripts/sync-content.mjs, but no workflow invoked the
# script: the US-155 AC ("vitest unit tests pass") held at the time the test
# code merged and was never re-verified on subsequent PRs. This workflow
# closes that gap. Lightweight + fast — no dev-repo content sync, no static
# export, no Lighthouse — so unit-test feedback arrives in well under a
# minute on a green run.
#
# Action SHA pins (per CONTRIBUTING.md SHA-pinning convention):
#   actions/checkout@v7.0.0    -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/setup-node@v6.4.0  -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test
