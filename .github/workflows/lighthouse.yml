name: Lighthouse CI

# US-157 / Sprint 28 -- Lighthouse PR gate. Runs on every PR to main, fails
# the merge button if Lighthouse reports a regression below the budgets in
# lighthouserc.json + budgets.json.
#
# Note: US-157 AC originally called for a separate @axe-core/cli step as a
# "second accessibility gate". After three rounds of Chrome / ChromeDriver
# version-mismatch debugging in CI, dropped in favour of Lighthouse's
# bundled axe-core invoked via explicit per-audit assertions in
# lighthouserc.json (image-alt, button-name, link-name, color-contrast,
# html-has-lang, html-lang-valid, document-title, meta-description).
# Same rule surface; one tool; no version dance.
# Revisit with @axe-core/playwright in a small node script if the broader
# axe-core rule set is needed (playwright manages its own browsers
# cleanly). Deviation recorded in the Sprint 28 Log under US-157 closeout.
#
# Action SHA pins (per the SHA-pinning convention in CONTRIBUTING.md):
#   actions/checkout@v7.0.0                                -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/setup-node@v6.4.0                              -> 48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
#   treosh/lighthouse-ci-action@12.6.2                     -> 3e7e23fb74242897f95c0ba9cabad3d0227b9b18
#   actions/upload-artifact@v7.0.1                         -> 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   peter-evans/find-comment@v4.0.0                        -> b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad
#   peter-evans/create-or-update-comment@v5.0.0            -> e8674b075228eee787fea43ef493e45ece1004c9

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse-ci:
    # Dependabot PRs run with a restricted GITHUB_TOKEN and no access to
    # repository secrets, so `secrets.FRAME_CONTENT_TOKEN` is empty and
    # the cross-repo sparse checkout of `mputaala/Frame` below aborts
    # with "Input required and not supplied: token". Dependency-bump PRs
    # only touch package.json / package-lock.json and can't materially
    # regress the Lighthouse budget on their own; the tests workflow
    # (which does not need the cross-repo token) still runs and gates
    # the PR. Post-merge Lighthouse on main catches any real regression
    # before it ships. If a specific Dependabot bump needs Lighthouse
    # verification, rebase it as a manual PR and this job runs normally.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Checkout dev repo (read-only, sparse) for content sync
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: mputaala/Frame
          token: ${{ secrets.FRAME_CONTENT_TOKEN }}
          path: dev-content
          sparse-checkout: |
            Documentation/Policies
            Documentation/User Guide
            Documentation/Marketing
            Documentation/Features
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run sync-content
        run: node scripts/sync-content.mjs --dev-repo dev-content

      - name: Generate OG cards (US-162)
        run: node scripts/generate-og-images.mjs

      - name: Generate sitemap (US-162)
        run: node scripts/generate-sitemap.mjs

      - name: Build static export
        run: npm run build

      - name: Lighthouse CI (collect + assert + upload)
        id: lhci
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # v12.6.2
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse-CI artefacts (retained 30 days)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: lighthouse-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 30

      - name: Find existing Lighthouse summary comment
        if: always() && github.event.pull_request.number
        id: find-lh-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad  # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- lighthouse-summary -->"

      - name: Compose Lighthouse summary body
        if: always() && github.event.pull_request.number
        id: compose
        run: |
          BODY_PATH=$(mktemp)
          {
            echo '<!-- lighthouse-summary -->'
            echo '## Lighthouse CI summary'
            echo
            echo 'Lighthouse + axe-core PR gate (US-157).'
            echo
            if [ -n '${{ steps.lhci.outputs.links }}' ]; then
              echo '**Lighthouse reports:**'
              echo '${{ steps.lhci.outputs.links }}'
              echo
            fi
            if [ -n '${{ steps.lhci.outputs.assertionResults }}' ]; then
              echo '<details><summary>Assertion results</summary>'
              echo
              echo '```json'
              echo '${{ steps.lhci.outputs.assertionResults }}'
              echo '```'
              echo
              echo '</details>'
            fi
            echo
            echo '_Lighthouse JSON reports attached as workflow artefact `lighthouse-${{ github.run_id }}` (retained 30 days). axe-core accessibility audits are run by Lighthouse internally and gated via the per-audit assertions in `lighthouserc.json`._'
          } > "$BODY_PATH"
          echo "body_path=$BODY_PATH" >> "$GITHUB_OUTPUT"

      - name: Post / update Lighthouse summary on PR
        if: always() && github.event.pull_request.number
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9  # v5.0.0
        with:
          comment-id: ${{ steps.find-lh-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.compose.outputs.body_path }}
          edit-mode: replace
